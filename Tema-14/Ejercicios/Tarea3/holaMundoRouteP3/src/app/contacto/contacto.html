<div class="contacto-container">
  <h2>Formulario de Contacto</h2>
  <p>Déjanos tu mensaje y te responderemos lo antes posible.</p>

  <form class="contacto-form" (ngSubmit)="enviarMensaje()">

    <mat-form-field appearance="fill">
      <mat-label>Nombre completo</mat-label>
      <input matInput placeholder="Ej. Juan Pérez" required>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Correo electrónico</mat-label>
      <input matInput type="email" placeholder="ejemplo@correo.com" required>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Tu mensaje</mat-label>
      <textarea matInput rows="5" placeholder="Escribe aquí tu consulta..." required></textarea>
    </mat-form-field>

    <button mat-raised-button type="submit" class="btn-enviar">Enviar Mensaje</button>

  </form>
</div>
